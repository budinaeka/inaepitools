# Define the user we should use when spawning R Shiny processes
run_as shiny;

# Define a server that listens on port 3838
server {
  listen 3838;

  # Define a location at the base URL
  location / {

    # Host the directory of Shiny Apps stored in this directory
    site_dir /srv/shiny-server;

    # Log all Shiny output to files in this directory
    log_dir /var/log/shiny-server;

    # When a user visits the base URL rather than a specific application,
    # an index of the applications available in this directory will be shown.
    directory_index on;
    
    # Increase application timeout to allow longer initialization
    app_init_timeout 300;
    
    # Enable sanitize_errors to prevent sensitive info leakage in production
    # but for debugging we might want it off temporarily
    sanitize_errors false;
    
    # Disable idle timeout for development
    app_idle_timeout 0;
  }
}
